<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página Não Encontrada | ArcSys</title>
    <style>
        body {
            background-color: #0f172a; /* Fundo Dark igual ao do sistema */
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            font-weight: 800;
            color: #3b82f6; /* Azul ArcSys */
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); /* Efeito Neon */
        }

        h2 {
            font-size: 2rem;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn-voltar {
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-voltar:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .logo {
            margin-bottom: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="logo">ARCSYS PAINEL</div>
    
    <h1>404</h1>
    <h2>Ops! Página não encontrada.</h2>
    
    <p>
        Parece que você tentou acessar uma rota que não existe ou foi movida.
        Não se preocupe, seus dados estão seguros.
    </p>

    <a href="/" class="btn-voltar">Voltar para o Início</a>

</body>
</html>
